<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cutGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Waveform — left (bigger bars, wider spread) -->
  <g transform="translate(55, 240)">
    <rect x="0" y="100" width="40" height="100" rx="20" fill="url(#waveGrad)" opacity="0.45"/>
    <rect x="56" y="60" width="40" height="180" rx="20" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="112" y="25" width="40" height="250" rx="20" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="168" y="0" width="40" height="300" rx="20" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="224" y="30" width="40" height="240" rx="20" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="280" y="65" width="40" height="170" rx="20" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="336" y="95" width="40" height="110" rx="20" fill="url(#waveGrad)" opacity="0.4"/>
  </g>

  <!-- Waveform — right (bigger bars, wider spread) -->
  <g transform="translate(588, 240)">
    <rect x="0" y="95" width="40" height="110" rx="20" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="56" y="65" width="40" height="170" rx="20" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="112" y="30" width="40" height="240" rx="20" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="168" y="0" width="40" height="300" rx="20" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="224" y="25" width="40" height="250" rx="20" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="280" y="60" width="40" height="180" rx="20" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="336" y="100" width="40" height="100" rx="20" fill="url(#waveGrad)" opacity="0.45"/>
  </g>

  <!-- Scissors — pivot at dead center, X-shaped blades -->
  <g transform="translate(512, 390)">
    <!-- Top-left blade → bottom-right -->
    <line x1="-170" y1="-170" x2="170" y2="170" stroke="url(#cutGrad)" stroke-width="13" stroke-linecap="round"/>
    <!-- Bottom-left blade → top-right -->
    <line x1="-170" y1="170" x2="170" y2="-170" stroke="url(#cutGrad)" stroke-width="13" stroke-linecap="round"/>

    <!-- Top-left finger ring -->
    <circle cx="-200" cy="-200" r="46" fill="none" stroke="url(#cutGrad)" stroke-width="12"/>
    <!-- Bottom-left finger ring -->
    <circle cx="-200" cy="200" r="46" fill="none" stroke="url(#cutGrad)" stroke-width="12"/>

    <!-- Pivot bolt (center) -->
    <circle cx="0" cy="0" r="15" fill="#f43f5e"/>
    <circle cx="0" cy="0" r="6" fill="#1e293b"/>
  </g>

  <!-- App name -->
  <text x="512" y="890" text-anchor="middle" fill="white" font-family="SF Pro Display,system-ui,-apple-system,sans-serif" font-size="96" font-weight="800" letter-spacing="8" opacity="0.95">Silenci</text>
</svg>
